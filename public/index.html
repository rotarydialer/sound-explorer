<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Sound Explorer</h1>
  </header>
  <div id="layout">
    <nav id="sidebar">
      <div id="generate-panel">
        <h2>Generate</h2>
        <div class="gen-field">
          <label for="gen-count">Count</label>
          <input type="number" id="gen-count" value="10" min="1" max="100">
        </div>
        <div class="gen-field">
          <label for="gen-types">Types</label>
          <select id="gen-types" multiple>
            <option value="fm" selected>FM</option>
            <option value="subtractive" selected>Subtractive</option>
            <option value="additive" selected>Additive</option>
            <option value="granular" selected>Granular</option>
          </select>
        </div>
        <div class="gen-field">
          <label for="gen-duration">Duration (s)</label>
          <input type="number" id="gen-duration" placeholder="random" min="0.5" max="30" step="0.5">
        </div>
        <button id="gen-btn" onclick="triggerGenerate()">Generate</button>
        <div id="gen-status"></div>
      </div>
      <h2>Batches</h2>
      <ul id="batch-list"></ul>
    </nav>
    <main id="main">
      <div id="sounds"></div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
