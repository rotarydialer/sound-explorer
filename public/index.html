<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Sound Explorer</h1>
    <button id="gen-bar-toggle" onclick="toggleGenerateBar()" title="Show/hide Generate panel">Hide</button>
  </header>

  <section id="generate-bar">
    <div class="gen-types">
      <div class="type-group" data-group="classic">
        <h3>Classic</h3>
        <div class="type-pills" data-types="fm,subtractive,additive,granular"></div>
      </div>
      <div class="type-group" data-group="percussive">
        <h3>Percussive &amp; Physical</h3>
        <div class="type-pills" data-types="karplus,modal,drum,physical"></div>
      </div>
      <div class="type-group" data-group="vocal">
        <h3>Vocal &amp; Texture</h3>
        <div class="type-pills" data-types="formant,noise,stochastic"></div>
      </div>
      <div class="type-group" data-group="distortion">
        <h3>Distortion &amp; Spectral</h3>
        <div class="type-pills" data-types="waveshape,ringmod"></div>
      </div>
      <div class="type-group type-group-samples" data-group="samples">
        <h3>Sample-based</h3>
        <div class="type-pills" data-types="granular_sample,timestretch,spectral_morph,cross_synth,convolution"></div>
      </div>
    </div>

    <div class="gen-controls">
      <div class="gen-quick">
        <span class="gen-quick-label">Quick:</span>
        <button type="button" onclick="selectTypes('all')">All</button>
        <button type="button" onclick="selectTypes('none')">None</button>
        <button type="button" onclick="selectTypes('pure')">Pure only</button>
        <button type="button" onclick="selectTypes('samples')">Samples only</button>
      </div>

      <div class="gen-knobs">
        <label class="gen-knob">
          <span>Count</span>
          <input type="number" id="gen-count" value="10" min="1" max="100">
        </label>
        <label class="gen-knob">
          <span>Frequency (Hz)</span>
          <input type="number" id="gen-freq" placeholder="random" min="20" max="8000" step="1">
        </label>
        <label class="gen-knob">
          <span>Duration (s)</span>
          <input type="number" id="gen-duration" placeholder="random" min="0.5" step="0.5">
        </label>
        <button id="gen-btn" onclick="triggerGenerate()">Generate</button>
      </div>
    </div>

    <div id="gen-status"></div>
  </section>

  <div id="layout">
    <nav id="sidebar">
      <div id="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="batches">Batches</button>
        <button class="sidebar-tab" data-tab="favorites">Favorites <span id="tab-fav-count"></span></button>
      </div>
      <div id="sidebar-pane-batches" class="sidebar-pane active">
        <button id="cleanup-btn" class="sidebar-action" onclick="cleanupNonFavorites()" title="Move every non-favorited sound into the trash/ directory">🗑️ Clean Up</button>
        <div id="cleanup-status"></div>
        <ul id="batch-list"></ul>
      </div>
      <div id="sidebar-pane-favorites" class="sidebar-pane">
        <ul id="favorites-nav"></ul>
      </div>
    </nav>
    <main id="main">
      <div id="sounds"></div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
